<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="brand-fla">FLA</span><span class="brand-store">STORE</span>
      <small>Área Administrativa</small>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-group">
        <label for="usuario">Usuário</label>
        <input
          id="usuario"
          type="text"
          formControlName="usuario"
          placeholder="admin"
          autocomplete="username" />
        @if (form.get('usuario')?.invalid && form.get('usuario')?.touched) {
          <span class="field-error">Campo obrigatório</span>
        }
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input
          id="senha"
          type="password"
          formControlName="senha"
          placeholder="••••••••"
          autocomplete="current-password" />
        @if (form.get('senha')?.invalid && form.get('senha')?.touched) {
          <span class="field-error">Campo obrigatório</span>
        }
      </div>

      @if (erro) {
        <div class="login-error">{{ erro }}</div>
      }

      <button type="submit" class="btn btn-primary btn-full" [disabled]="carregando">
        @if (carregando) {
          Entrando...
        } @else {
          Entrar
        }
      </button>
    </form>

    <p class="login-hint">Credenciais: <code>admin / admin</code></p>
  </div>
</div>
